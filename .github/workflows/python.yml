name: Python

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - "!tests/*.rs"
      - bindings/python/pyproject.toml
      - .github/workflows/python.yml
    tags: ["git-bot-feedback-py/v*"]
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - "!tests/*.rs"
      - bindings/python/pyproject.toml
      - .github/workflows/python.yml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  wheels:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
          - runner: ubuntu-latest
            target: s390x
          - runner: ubuntu-latest
            target: ppc64le
          - runner: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: x86
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: armv7
            manylinux: musllinux_1_2
          - runner: windows-latest
            target: x64
            py-arch: x64
          - runner: windows-latest
            target: x86
            py-arch: x86
          - runner: windows-11-arm
            target: aarch64
            py-arch: arm64
            # python 3.11 is the minimum version available for arm64 on windows.
            pyo3-feature: pyo3/abi3-py311
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          architecture: ${{ matrix.py-arch || null }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          # Use the zig toolchain for all targets except linux ppc64le.
          # Note, this is meant to avoid build errors in aws-lc-sys crate, which compiles C code.
          # For using reqwest v0.13 with `default-tls` feature.
          args: >-
            --release
            --out dist
            --find-interpreter
            --features ${{ matrix.pyo3-feature || 'pyo3/abi3-py310' }}
            ${{ runner.os == 'Linux' && matrix.target != 'ppc64le' && '--zig' || '' }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          manylinux: ${{ matrix.manylinux || 'auto' }}
          # here we either install the ppc64le compiler/toolchain or install zig on all others
          # spell-checker: disable
          before-script-linux: |
            case "${{ matrix.target }}" in
              ppc64le)
                apt-get update
                apt-get install -y \
                  pkg-config \
                  gcc-powerpc64le-linux-gnu \
                  g++-powerpc64le-linux-gnu \
                  binutils-powerpc64le-linux-gnu \
                  libc6-dev-ppc64el-cross \
                  libfontconfig1-dev
                ;;
            esac
          # spell-checker: enable
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ runner.os }}-${{ matrix.target }}_${{ matrix.manylinux || '' }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - run: rustup update
      - uses: actions/setup-python@v6
        id: python-setup
        with:
          python-version: 3.x
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        # zizmor: ignore[cache-poisoning]
        with:
          python-version: ${{ steps.python-setup.outputs.python-version }}
      - uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - name: Install nur
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall -y nur
      - name: Run tests
        run: nur test py

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/git-bot-feedback-py/v')
    needs: [wheels, sdist]
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - name: Install nur
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall -y nur
      - name: Install uv
        # zizmor: ignore[cache-poisoning]
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build docs
        run: nur docs
      - name: Upload docs
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy-docs:
    name: Deploy docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docs
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        id: deploy-pages

  check-dist:
    needs: [wheels, sdist]
    if: ${{ !startsWith(github.ref, 'refs/tags/git-bot-feedback-py/v') }}
    name: Check package dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Check distributions
        # spell-checker: disable-next-line
        run: pipx run twine check dist/*
